name: build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.11.0]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m venv .venv
        source .venv/bin/activate
        python -m pip install -r charity/requirements.txt
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
    - name: Run Tests
      env:
        CELERY_BROKER_QUEUE: django-celery
        CELEREY_PERIODIC_BROKER_QUEUE: django-celery-periodic
        DEFAULT_QUEUE_NAME: "django-default"
        AZURE_STORAGE_NAME: testaccountname
        DEFAULT_STORAGE_PROVIDER: LOCAL
        CSRF_TRUSTED_ORIGINS: "*"
        AZURE_CLIENT_ID:  ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_AD_AUTHORITY:  ${{ secrets.AZURE_AD_AUTHORITY }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_AD_REDIRECT_URI: ${{ secrets.AZURE_AD_REDIRECT_URI }}
        SECRET_KEY: "django_test"
        DB_URL: "sqlite://charity/db.sqlite3"
      run: |
       python charity/manage.py test charity
