{% extends 'base.html' %}
{% block content %}
{% load customtags %}

<div class="container-fluid px-4">
  <div class="d-flex justify-content-between align-items-center mt-3 mb-2">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{{ return_url }}" class="text-decoration-none text-muted small"><i
              class="fa-solid fa-arrow-left me-1"></i> Back</a></li>
        <li class="breadcrumb-item active small">Post Comment</li>
      </ol>
    </nav>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-3">
      <div class="row g-3">
        <div class="col-md-auto text-center border-end pe-4" style="min-width: 140px;">
          <div class="mb-2">
            {% include 'partials/user_image_part.html' %}
          </div>
          <div class="text-muted small" style="font-size: 0.7rem;">
            {% now 'H:i' %}<br>{% now 'M d, Y' %}
          </div>
        </div>

        <div class="col-md">
          <form action="" method="post">
            {% csrf_token %}
            {{ form }}
            <div class="mb-2">
              {% if form.errors %}
              <div class="text-danger small mt-1">{{ form.errors }}</div>
              {% endif %}
            </div>

            <div class="d-flex justify-content-end">
              <button type="submit" class="btn btn-primary px-4 shadow-sm btn-sm">
                <i class="fa-solid fa-paper-plane me-2"></i>Publish Post
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
