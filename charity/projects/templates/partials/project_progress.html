<div class="project-progress-wrapper">
  <div class="d-flex justify-content-between align-items-end mb-1">
    <div class="d-flex flex-column">
      <span class="text-muted fw-bold small text-uppercase" style="font-size: 0.6rem; letter-spacing: 0.5px;">
        Overall Progress
      </span>
      <div class="small">
        <span class="fw-bold text-dark">{{ project.done_tasks_count }}</span>
        <span class="text-muted">/ {{ project.tasks_count }} Tasks Done</span>
      </div>
    </div>
    <div class="text-end">
      <span class="h6 fw-bold mb-0 {% if complete_in_percents == 100 %}text-success{% else %}text-primary{% endif %}">
        {{ complete_in_percents }}%
      </span>
    </div>
  </div>

  <div class="progress shadow-none bg-secondary-soft" style="height: 8px; border-radius: 4px;" data-bs-toggle="tooltip"
    data-bs-placement="top" title="{{ project.done_tasks_count }} of {{ project.tasks_count }} tasks completed">

    <div class="progress-bar {% if complete_in_percents == 100 %}bg-success{% else %}bg-primary{% endif %}"
      role="progressbar" style="width: {{ complete_in_percents }}%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);"
      aria-valuenow="{{ complete_in_percents }}" aria-valuemin="0" aria-valuemax="100">
    </div>
  </div>
</div>

<style>
  /* Soft background for the empty part of the bar */
  .bg-secondary-soft {
    background-color: rgba(108, 117, 125, 0.1);
  }

  /* Add a subtle glow to the bar when 100% complete */
  .progress-bar.bg-success {
    box-shadow: 0 0 8px rgba(25, 135, 84, 0.2);
  }

  /* Animation for smooth entrance */
  .progress-bar {
    border-radius: 4px;
  }
</style>
