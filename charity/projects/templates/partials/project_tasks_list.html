{% load projectstags %}
{% load projectfilters %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h6 class="mb-0 fw-bold text-muted text-uppercase small">
    <i class="fa-solid fa-list-check me-2 text-primary"></i>Project Deliverables
  </h6>
  <a {% if project|validate_pre_requirements:user %} href="{% url 'tasks:create' %}?project_id={{ project.id }}"
    class="btn btn-sm btn-primary shadow-sm px-3" {% else %}
    class="btn btn-sm btn-outline-secondary disabled opacity-50 shadow-none" {% endif %}>
    <i class="fa-solid fa-plus me-1"></i> New Task
  </a>
</div>

<div class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <span class="small fw-bold text-muted text-uppercase">Workflow Board</span>
      <span class="badge bg-light text-dark border ms-2 fw-normal">{{ items_count }} Tasks Total</span>
    </div>
    <div class="d-flex gap-2">
      <span class="text-muted small italic"><i class="fa-solid fa-circle-info me-1"></i> Drag and drop to update
        status</span>
    </div>
  </div>

  <div class="card-body bg-light-soft p-4">
    <div class="task-board-wrapper">
      {% render_tasks_board project=project tasks=page %}
    </div>
  </div>
</div>

<style>
  /* Soft background for the Kanban area to make cards pop */
  .bg-light-soft {
    background-color: #f8f9fa;
    border-radius: 0 0 0.5rem 0.5rem;
  }

  /* Ensure the task board wrapper handles horizontal scrolling if needed */
  .task-board-wrapper {
    overflow-x: auto;
    padding-bottom: 1rem;
  }

  /* Customizing the appearance of cards inside your custom tag via CSS inheritance */
  .task-board-wrapper .card {
    border: none !important;
    margin-bottom: 1rem;
    transition: transform 0.2s ease;
  }

  .task-board-wrapper .card:hover {
    transform: translateY(-3px);
  }
</style>

{% include 'generic_errormodal.html' %}
{% include 'partials/js.html' %}
