<div id="{{ widget.attrs.id }}-wrapper" class="enum-choices-widget">
  <div class="row g-2 align-items-center mb-3">
    <div class="col">
      <input type="text" class="form-control choice-input" 
             placeholder="Add an item..." disabled />
    </div>
    <div class="col-auto">
      <button class="btn btn-primary add-choice-btn" type="button" disabled>
        <i class="fa-solid fa-plus"></i> Add
      </button>
    </div>
  </div>

  <div class="list-group choices-list">
    {% for enum_value in widget.enum_values %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ enum_value.value }}</span>
        <input type="hidden" name="{{ widget.name }}" value="{{ enum_value.value }}">
        <button type="button" class="btn btn-sm btn-outline-danger remove-choice-btn">
          <i class="fa-solid fa-trash-can"></i>
        </button>
      </div>
    {% endfor %}
  </div>

  <script type="text/javascript">
    (function() {
      const widgetId = '{{ widget.attrs.id }}-wrapper';
      const relationId = '{{ widget.relation_id }}';
      const relationValue = '{{ widget.relation_value }}';
      const widgetName = '{{ widget.name }}';

      const wrapper = document.getElementById(widgetId);
      const choiceInput = wrapper.querySelector('.choice-input');
      const addBtn = wrapper.querySelector('.add-choice-btn');
      const listContainer = wrapper.querySelector('.choices-list');
      const relationElement = document.getElementById(relationId);

      const toggleWidget = (val) => {
        const isHidden = (val !== relationValue);
        
        // Find the container (usually a <p> or <div> wrapping the field)
        let container = wrapper.parentElement;
        if (container && container.tagName === 'P') {
          // If using as_p
          container.style.display = isHidden ? 'none' : 'block';
        } else {
          // Fallback to wrapper itself
          wrapper.style.display = isHidden ? 'none' : 'block';
        }

        choiceInput.disabled = isHidden;
        addBtn.disabled = isHidden;
        
        if (isHidden) {
          listContainer.innerHTML = '';
          choiceInput.value = '';
        }
      };

      addBtn.addEventListener('click', () => {
        const val = choiceInput.value.trim();
        if (!val) return;

        const item = document.createElement('div');
        item.className = 'list-group-item d-flex justify-content-between align-items-center';
        item.innerHTML = `
          <span>${val}</span>
          <input type="hidden" name="${widgetName}" value="${val}">
          <button type="button" class="btn btn-sm btn-outline-danger remove-choice-btn">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        `;
        listContainer.appendChild(item);
        choiceInput.value = '';
      });

      listContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('.remove-choice-btn');
        if (btn) {
          btn.closest('.list-group-item').remove();
        }
      });

      if (relationElement) {
        relationElement.addEventListener('change', (e) => toggleWidget(e.target.value));
        // Initial state
        toggleWidget(relationElement.value);
      }
    })();
  </script>
</div>
