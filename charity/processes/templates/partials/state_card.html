{% load customtags %}

<div class="workflow-node-container position-relative mb-4">
  <div class="step-badge-wrapper shadow-sm">
    <span class="step-number">{{ state.order_position }}</span>
  </div>

  <div class="card workflow-node border-0 shadow-sm h-100 {% if state.is_inactive %}opacity-75 bg-light{% endif %}">
    <div class="card-body p-3">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <h6 class="mb-0 fw-bold">
          <a href="{% url 'processes:edit_state_details' process.id state.id %}"
            class="text-decoration-none text-dark stretched-link">
            {{ state.name }}
          </a>
        </h6>
        {% if state.is_inactive %}
        <span class="badge rounded-pill bg-secondary-soft text-secondary border border-secondary px-2"
          style="font-size: 0.6rem;">INACTIVE</span>
        {% endif %}
      </div>

      <p class="text-muted small mb-3 text-truncate-2" style="font-size: 0.75rem; min-height: 2.25rem;">
        {{ state.notes|default:"No instructions defined for this step." }}
      </p>

      <div class="d-flex align-items-center justify-content-between border-top pt-2">
        <div class="d-flex gap-2">
          {% if state.is_approvement_required %}
          <span class="badge bg-warning-soft text-warning border border-warning px-2" data-bs-toggle="tooltip"
            title="Requires Reviewer Approval">
            <i class="fa-solid fa-lock text-warning me-1"></i>GATE
          </span>
          {% endif %}
        </div>
        <small class="text-muted" style="font-size: 0.65rem;">
          <i class="fa-regular fa-clock me-1"></i>{{ state.date_created|date:"M d" }}
        </small>
      </div>
    </div>
  </div>

  <div class="flow-connector d-none d-xl-flex">
    <i class="fa-solid fa-chevron-right text-muted opacity-25"></i>
  </div>
</div>

<style>
  /* Styling for the Workflow Node */
  .workflow-node-container {
    padding-left: 20px;
    /* Space for the step badge */
  }

  .workflow-node {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border-left: 4px solid #0d6efd !important;
    /* Visual "Flow" color */
  }

  .workflow-node:hover {
    transform: translateX(5px);
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1) !important;
  }

  /* The Step Number Badge */
  .step-badge-wrapper {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    background: #0d6efd;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    z-index: 5;
    border: 4px solid #fff;
  }

  .text-truncate-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Flow Connector Arrow */
  .flow-connector {
    position: absolute;
    right: -15px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
  }

  /* Specific styles for Inactive nodes */
  .opacity-75 .step-badge-wrapper {
    background: #6c757d;
  }

  .opacity-75.workflow-node {
    border-left-color: #6c757d !important;
  }
</style>
