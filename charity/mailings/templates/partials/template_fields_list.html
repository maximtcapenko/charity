<div id="{{ widget.attrs.id }}-container">
  <p class="card-text text-muted small">
    Use syntax <code>{% verbatim %}{{field}}{% endverbatim %}</code> to insert data into the template text.
  </p>
  <div id="{{ widget.attrs.id }}-fields" 
       class="template-fields-list"
       data-relation-id="{{ widget.relation_id }}" 
       data-fetch-url="{{ widget.fetch_url }}">
    {% include 'partials/fields.html' %}
  </div>

  <script type="text/javascript">
    (function() {
      const relationId = '{{ widget.relation_id }}';
      const fetchUrl = '{{ widget.fetch_url }}';
      const containerId = '{{ widget.attrs.id }}-fields';

      const updateFields = async (content_type_id) => {
        const container = document.getElementById(containerId);
        if (!content_type_id) {
          container.innerHTML = '';
          return;
        }

        try {
          const response = await fetch(`${fetchUrl}?content_type_id=${content_type_id}`);
          if (response.ok) {
            const data = await response.json();
            container.innerHTML = data.html || '';
          }
        } catch (error) {
          console.error('Error fetching template fields:', error);
        }
      };

      const init = () => {
        const relationElement = document.getElementById(relationId);
        if (relationElement) {
          relationElement.addEventListener('change', (e) => {
            updateFields(e.target.value);
          });
        }
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</div>
